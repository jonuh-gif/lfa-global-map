<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LFA Global Office Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
}

#map{
    width:100%;
    height:100vh;
}

.leaflet-popup-content{
    font-size:14px;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([25,0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'&copy; OpenStreetMap contributors'
}).addTo(map);

const offices = [

{
name:"USA Headquarters",
lat:33.91966,
lng:-118.41596,
address:"319 Main Street, El Segundo, CA 90245",
streetview:"https://www.google.com/maps/place/319+Main+Street+El+Segundo,+CA+90245/"
},

{
name:"Glendale Office",
lat:34.15328,
lng:-118.25498,
address:"505 N Brand Blvd, Suite 820, Glendale, CA 91203",
streetview:"https://www.google.com/maps/@34.1532819,-118.254981,3a,75y,338.33h,105.31t"
},

{
name:"Orange County Office",
lat:33.68453,
lng:-117.85451,
address:"1920 Main Street, Suite 920, Irvine, CA 92614",
streetview:"https://www.google.com/maps/@33.6845337,-117.8545141,3a,75y,307.57h,81.7t"
},

{
name:"San Diego Office",
lat:32.71360,
lng:-117.16433,
address:"135 F Street, Suite 500, San Diego, CA 92101",
streetview:"https://www.google.com/maps/@32.7136013,-117.1643347,3a,75y,353.46h,90.57t"
},

{
name:"India Office",
lat:13.0827,
lng:80.2707,
address:"Chennai, India",
streetview:"https://www.google.com/maps"
},

{
name:"Egypt Office",
lat:30.0444,
lng:31.2357,
address:"Cairo, Egypt",
streetview:"https://www.google.com/maps"
}

];

offices.forEach(function(office){

L.circleMarker(
    [office.lat, office.lng],
    {
        radius:8,
        color:"#ffffff",
        weight:2,
        fillColor:"#e63946",
        fillOpacity:1
    }
)
.addTo(map)
.bindPopup(`
    <b>${office.name}</b><br>
    ${office.address}<br><br>
    <a href="${office.streetview}" target="_blank">
    View Office
    </a>
`);

});

</script>

</body>
</html>
