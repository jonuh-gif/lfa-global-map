<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LFA Global Office Map</title>
<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f7f8fa;
    color:#233244;
}
.container{
    width:95%;
    max-width:1500px;
    margin:auto;
    padding:35px 0 40px;
}
h1{
    text-align:center;
    font-size:48px;
    color:#1d2d44;
    margin-bottom:12px;
}
.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:30px;
    font-size:18px;
}
#map{
    width:100%;
    height:520px;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 10px 35px rgba(0,0,0,.15);
}
.office-section{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:70px;
    margin-top:40px;
}
.office-column h2{
    margin-bottom:20px;
    color:#1d2d44;
    font-size:30px;
}
.office-card{
    background:#fff;
    padding:18px;
    margin-bottom:18px;
    border-radius:12px;
    box-shadow:0 5px 18px rgba(0,0,0,.08);
    transition:.25s;
    cursor:pointer;
}
.office-card:hover{
    transform:translateY(-4px);
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}
.office-card h3{
    color:#b30000;
    margin-bottom:8px;
    font-size:20px;
}
.office-card p{
    line-height:1.6;
    color:#555;
}
.office-card button{
    margin-top:15px;
    background:#b30000;
    color:#fff;
    border:none;
    padding:10px 18px;
    border-radius:6px;
    cursor:pointer;
    transition:.3s;
}
.office-card button:hover{
    background:#8e0000;
}
@media(max-width:900px){
.office-section{
grid-template-columns:1fr;
}
h1{
font-size:36px;
}
#map{
height:420px;
}
}
</style>
</head>
<body>
<div class="container">
<p class="subtitle">
Click any office marker to zoom in and view details.
</p>
<div id="map"></div>
<div class="office-section">
<div class="office-column">
<h2>Southern California Locations</h2>
<div id="us-offices"></div>
</div>
<div class="office-column">
<h2>International Locations</h2>
<div id="international-offices"></div>
</div>
</div>
</div>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([25,10],2);
L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap contributors'
}
).addTo(map);
const offices = [{
name:"Main Office",
lat:33.91966,
lng:-118.41596,
address:"319 Main Street, El Segundo, CA 90245",
phone:"(213) 239-9700",
street:"https://www.google.com/maps/place/319+Main+Street+El+Segundo,+CA+90245/@33.91966,-118.4159614,3a,75y,277.33h,90t/data=!3m4!1e1!3m2!1sZ9fj4HXJO25oyBkhj-GVkg!2e0!4m2!3m1!1s0x80c2b141d5656a41:0x215dbf331db5f69d",
},
{
name:"Glendale Office",
lat:34.15328,
lng:-118.25498,
address:"505 N Brand Blvd, Suite 800, Glendale, CA 91203",
phone:"(626) 351-3367",
street:"https://www.google.com/maps/@34.1532819,-118.254981,3a,75y,338.33h,105.31t",
},
{
name:"Orange County Office",
lat:33.68453,
lng:-117.85451,
address:"1900 Main Street, Suite 800, Irvine, CA 92614",
phone:"(949) 576-3922",
street:"https://www.google.com/maps/@33.6845337,-117.8545141,3a,75y,307.57h,81.7t",
},
{
name:"San Diego Office",
lat:32.71360,
lng:-117.16433,
address:"185 F Street, Suite 500, San Diego, CA 92101",
phone:"(619) 560-0080",
street:"https://www.google.com/maps/@32.7136013,-117.1643347,3a,75y,353.46h,90.57t",
},
{
name:"India Office",
lat:13.0827,
lng:80.2707,
address:"No.111 (141), Rajiv Gandhi Road, Kottivakkam, Chennai 600041",
street:"https://www.google.com/maps/search/?api=1&query=Rajiv+Gandhi+Road+Chennai",
},
{
name:"Egypt Office",
lat:30.1120,
lng:31.4000,
address:"Plot 1258, Building 6C, Office No.102, Sheraton, Cairo 11799",
street:"https://www.google.com/maps/search/?api=1&query=Sheraton+Cairo+11799",
}
];
const icon = L.circleMarker([0,0],{
    radius:6,
    color:"#ffffff",
    weight:2,
    fillColor:"#d60000",
    fillOpacity:1
});
function zoomOffice(lat,lng){
    map.flyTo([lat,lng],17,{
        duration:2
    });
}
offices.forEach(office=>{
    const marker=L.circleMarker(
        [office.lat,office.lng],
        {
            radius:6,
            color:"#ffffff",
            weight:2,
            fillColor:"#d60000",
            fillOpacity:1
        }
    ).addTo(map);
    marker.bindPopup(`
    <div style="min-width:220px">
        <h3 style="margin-bottom:8px">${office.name}</h3>
        <p style="line-height:1.6">
        ${office.address}
        </p>
        <a
        href="${office.street}"
        target="_blank"
        style="
        display:inline-block;
        margin-top:10px;
        background:#b30000;
        color:white;
        text-decoration:none;
        padding:10px 16px;
        border-radius:6px;
        ">
        View Street View
        </a>
    </div>
    `);
    marker.on("click",()=>{
        zoomOffice(
            office.lat,
            office.lng
        );
    });
});
function buildCards(list,id){
const container=document.getElementById(id);
list.forEach(office=>{
const card=document.createElement("div");
card.className="office-card";
card.innerHTML=`
<h3>${office.name}</h3>
<p>
${office.address}
</p>
<button>
View Street View
</button>
`;
card.querySelector("button").onclick=function(){
window.open(
office.street,
"_blank"
);
};
card.onclick=function(){
zoomOffice(
office.lat,
office.lng
);
};
container.appendChild(card);
});
}
buildCards(
offices.slice(0,4),
"us-offices"
);
buildCards(
offices.slice(4),
"international-offices"
);
</script>
</body>
</html>
