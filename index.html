<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LFA Global Office Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial,Helvetica,sans-serif;
    background:#f7f8fa;
    color:#233244;

}

.container{

    width:95%;
    max-width:1500px;
    margin:auto;
    padding:35px 0 40px;

}

h1{

    text-align:center;
    font-size:48px;
    color:#1d2d44;
    margin-bottom:12px;

}

.subtitle{

    text-align:center;
    color:#666;
    margin-bottom:30px;
    font-size:18px;

}

#map{

    width:100%;
    height:520px;

    border-radius:16px;

    overflow:hidden;

    box-shadow:0 10px 35px rgba(0,0,0,.15);

}

.office-section{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:70px;

    margin-top:40px;

}

.office-column h2{

    margin-bottom:20px;

    color:#1d2d44;

    font-size:30px;

}

.office-card{

    background:#fff;

    padding:18px;

    margin-bottom:18px;

    border-radius:12px;

    box-shadow:0 5px 18px rgba(0,0,0,.08);

    transition:.25s;

    cursor:pointer;

}

.office-card:hover{

    transform:translateY(-4px);

    box-shadow:0 10px 25px rgba(0,0,0,.15);

}

.office-card h3{

    color:#b30000;

    margin-bottom:8px;

    font-size:20px;

}

.office-card p{

    line-height:1.6;

    color:#555;

}

.office-card button{

    margin-top:15px;

    background:#b30000;

    color:#fff;

    border:none;

    padding:10px 18px;

    border-radius:6px;

    cursor:pointer;

    transition:.3s;

}

.office-card button:hover{

    background:#8e0000;

}

@media(max-width:900px){

.office-section{

grid-template-columns:1fr;

}

h1{

font-size:36px;

}

#map{

height:420px;

}

}

</style>

</head>

<body>

<div class="container">

<h1>Global Presence</h1>

<p class="subtitle">
Click any office marker to zoom in and view details.
</p>

<div id="map"></div>

<div class="office-section">

<div class="office-column">

<h2>Southern California Locations</h2>

<div id="us-offices"></div>

</div>

<div class="office-column">

<h2>International Locations</h2>

<div id="international-offices"></div>

</div>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([25,10],2);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap contributors'
}
).addTo(map);

const offices = [
